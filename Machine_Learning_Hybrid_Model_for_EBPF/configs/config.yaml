# eBPF Malware Detection Configuration

# Data paths
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  splits_dir: "data/splits"
  
# Trace types to process
traces:
  - filetop
  - installation
  - opensnoop
  - pattern
  - pids
  - tcp

# Feature extraction settings
features:
  # Syscall frequency features
  syscall_ngrams: [1, 2, 3]  # unigrams, bigrams, trigrams
  
  # File operation features
  sensitive_paths:
    - "/etc/passwd"
    - "/etc/shadow"
    - "/etc/hosts"
    - "/.ssh/"
    - "/proc/"
    - "/sys/"
    - "/.bashrc"
    - "/.bash_profile"
    - "/cron"
    - "/.aws/"
    - "/.config/"
    
  # Network features
  suspicious_ports:
    - 4444   # Metasploit default
    - 5555   # Common backdoor
    - 6666   # IRC
    - 1337   # Elite/hacker
    - 31337  # Back Orifice
    - 8080   # Alt HTTP
    - 8443   # Alt HTTPS
    
  # Temporal settings
  time_window_seconds: 1.0
  
# Model configurations
models:
  xgboost:
    n_estimators: 200
    max_depth: 8
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 1
    gamma: 0
    reg_alpha: 0.1
    reg_lambda: 1.0
    
  lstm:
    embedding_dim: 64
    hidden_dim: 128
    num_layers: 2
    dropout: 0.3
    bidirectional: true
    max_sequence_length: 500
    
  training:
    batch_size: 32
    epochs: 50
    learning_rate: 0.001
    early_stopping_patience: 10
    
# Train/Val/Test split ratios
splits:
  train: 0.7
  val: 0.15
  test: 0.15
  random_seed: 42
